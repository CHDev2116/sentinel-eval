name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: |
          pytest \
            --ignore=tests/test_generated_case_pipeline_demo.py \
            --ignore=tests/test_async_tri_agent_demo.py
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Publish release notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: SentinelEval ${{ steps.version.outputs.tag }}
          body: |
            ## Install

            ```bash
            pip install git+https://github.com/${{ github.repository }}.git@${{ steps.version.outputs.tag }}
            ```

            ## Prompt

            Default auditor prompt: **is_safe_v2.2** (requires `risk_score`, `confidence`, `uncertainty`).

            ## Verify

            ```bash
            python scripts/benchmark_gate.py
            ```
